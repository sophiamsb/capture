<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>capture</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0e0e0e;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 16px;
    }

    h1 {
      font-size: 1.1rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #888;
      margin-bottom: 40px;
    }

    form {
      width: 100%;
      max-width: 560px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    input, select {
      width: 100%;
      padding: 11px 14px;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 6px;
      color: #e0e0e0;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.15s;
    }
    input:focus, select:focus { border-color: #555; }
    input::placeholder { color: #444; }

    .row { display: flex; gap: 12px; }
    .row select { flex: 1; }

    button {
      padding: 11px;
      background: #e0e0e0;
      color: #0e0e0e;
      border: none;
      border-radius: 6px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    button:disabled { opacity: 0.4; cursor: default; }

    #log {
      width: 100%;
      max-width: 560px;
      margin-top: 28px;
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 0.78rem;
      color: #555;
      white-space: pre-wrap;
      line-height: 1.6;
      display: none;
    }

    #results {
      width: 100%;
      max-width: 900px;
      margin-top: 32px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 12px;
    }

    #results img {
      width: 100%;
      border-radius: 6px;
      border: 1px solid #1e1e1e;
      display: block;
    }

    #results video {
      width: 100%;
      border-radius: 6px;
      border: 1px solid #1e1e1e;
    }

    .dl {
      display: block;
      text-align: center;
      padding: 10px;
      background: #1a1a1a;
      border-radius: 6px;
      border: 1px solid #2a2a2a;
      color: #aaa;
      font-size: 0.82rem;
      text-decoration: none;
    }
    .dl:hover { border-color: #555; color: #e0e0e0; }

    #error {
      margin-top: 20px;
      color: #e05555;
      font-size: 0.88rem;
      max-width: 560px;
      text-align: center;
    }
  </style>
</head>
<body>

<h1>capture</h1>

<form id="form">
  <input type="url" id="url" placeholder="https://example.com" required />
  <div class="row">
    <select id="mode">
      <option value="tour">tour — scroll + hover shots</option>
      <option value="screenshot">screenshot — single frame</option>
      <option value="video">video — webm recording</option>
    </select>
    <select id="device">
      <option value="large-desktop">large desktop  1920×1080</option>
      <option value="desktop">desktop  1440×900</option>
      <option value="laptop">laptop  1280×800</option>
      <option value="tablet">tablet  768×1024</option>
      <option value="mobile">mobile  390×844</option>
    </select>
  </div>
  <button type="submit" id="btn">Capture</button>
</form>

<pre id="log"></pre>
<div id="results"></div>
<div id="error"></div>

<script>
  const form    = document.getElementById('form');
  const btn     = document.getElementById('btn');
  const logEl   = document.getElementById('log');
  const results = document.getElementById('results');
  const errEl   = document.getElementById('error');

  form.addEventListener('submit', async e => {
    e.preventDefault();
    btn.disabled = true;
    btn.textContent = 'Running…';
    logEl.style.display = 'block';
    logEl.textContent = '';
    results.innerHTML = '';
    errEl.textContent = '';

    const body = {
      url:    document.getElementById('url').value,
      mode:   document.getElementById('mode').value,
      device: document.getElementById('device').value,
    };

    const res = await fetch('/capture', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });

    const reader = res.body.getReader();
    const dec    = new TextDecoder();
    let   buf    = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += dec.decode(value, { stream: true });

      const events = buf.split('\n\n');
      buf = events.pop();

      for (const block of events) {
        const lines = block.split('\n');
        const eventLine = lines.find(l => l.startsWith('event:'));
        const dataLine  = lines.find(l => l.startsWith('data:'));
        if (!eventLine || !dataLine) continue;

        const event = eventLine.slice(7).trim();
        const data  = JSON.parse(dataLine.slice(5).trim());

        if (event === 'log') {
          logEl.textContent += data.line + '\n';
          logEl.scrollTop = logEl.scrollHeight;
        }

        if (event === 'done') {
          btn.disabled = false;
          btn.textContent = 'Capture';
          if (data.error) {
            errEl.textContent = data.error;
          } else {
            renderResults(data.files);
          }
        }
      }
    }
  });

  function renderResults(files) {
    for (const src of files) {
      const ext = src.split('.').pop().toLowerCase();
      if (['png', 'jpg', 'jpeg'].includes(ext)) {
        const a   = document.createElement('a');
        a.href    = src;
        a.target  = '_blank';
        const img = document.createElement('img');
        img.src   = src;
        a.appendChild(img);
        results.appendChild(a);
      } else if (['mp4', 'webm'].includes(ext)) {
        const vid = document.createElement('video');
        vid.src     = src;
        vid.controls = true;
        vid.loop    = true;
        results.appendChild(vid);
      } else {
        const a  = document.createElement('a');
        a.href   = src;
        a.download = src.split('/').pop();
        a.className = 'dl';
        a.textContent = '↓ ' + src.split('/').pop();
        results.appendChild(a);
      }
    }
  }
</script>
</body>
</html>
